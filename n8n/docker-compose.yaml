services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n
    # Permite que o n8n encontre o MCP via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  k8s-mcp:
    image: mcp/kubernetes:latest
    container_name: k8s-mcp
    restart: unless-stopped
    depends_on:
      - n8n
    # CORREÇÃO: Mapeamento de porta explícito para ser visível no WSL
    ports:
      - "3001:3001"
    # Mantendo seu usuário para evitar erro de permissão (EACCES)
    user: "1000:1000"
    volumes:
      # Usando o arquivo config-docker que criamos com o sed
      - /home/local_us/.kube/config-docker:/tmp/kubeconfig:ro
    environment:
      - KUBECONFIG=/tmp/kubeconfig
      - ENABLE_UNSAFE_STREAMABLE_HTTP_TRANSPORT=1
      - PORT=3001
      - HOST=0.0.0.0
    # CORREÇÃO: Necessário para o MCP achar o K8s API no IP do Windows/WSL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - n8n

networks:
  n8n:
    name: n8n

volumes:
  n8n_data: